<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hasan // Music</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts & Material Symbols (Material Design 3 için) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            // Material Design 3 Dark Theme Renk Paleti
            m3Bg: '#131316',
            m3Surface: '#1c1b1f',
            m3SurfaceVariant: '#2d2b30',
            m3Primary: '#d0bcff',
            m3OnPrimary: '#381e72',
            m3PrimaryContainer: '#4f378b',
            m3OnPrimaryContainer: '#eaddff',
            m3SecondaryContainer: '#4a4458',
            m3Outline: '#938f99',
            m3OnSurface: '#e6e1e5',
            m3OnSurfaceVariant: '#cac4d0',
          }
        }
      }
    }
  </script>

  <style>
    .m3-transition {
      transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
    }
    
    /* Canlı Müzik Ekolayzır Animasyonu */
    @keyframes eq-scale {
      0%, 100% { transform: scaleY(0.3); }
      50% { transform: scaleY(1); }
    }
    .eq-bar {
      transform-origin: bottom;
      animation: eq-scale 1.2s ease-in-out infinite;
    }
    .eq-1 { animation-delay: 0.1s; }
    .eq-2 { animation-delay: 0.4s; }
    .eq-3 { animation-delay: 0.2s; }
    .eq-4 { animation-delay: 0.6s; }
  </style>
</head>
<body class="bg-m3Bg text-m3OnSurface font-sans min-h-screen flex flex-col items-center py-12 px-4">

  <!-- Profil Başlığı -->
  <header class="flex flex-col items-center text-center mb-8 max-w-md w-full">
    <!-- Profil Avatar (M3 Squircle tarzı yuvarlatılmış kare) -->
    <div class="w-24 h-24 bg-m3PrimaryContainer rounded-[28px] flex items-center justify-center text-m3OnPrimaryContainer text-4xl font-bold shadow-md mb-4 select-none">
      H
    </div>
    <h1 class="text-3xl font-bold tracking-tight text-m3OnSurface">Hasan</h1>
  </header>

  <!-- ANA İÇERİK ALANI -->
  <main class="max-w-md w-full space-y-6">

    <!-- CANLI / SON ÇALAN KART (M3 Elevated Card) -->
    <section id="now-playing-card" class="bg-m3SurfaceVariant rounded-[28px] p-6 shadow-lg border border-white/5 m3-transition">
      <div class="flex items-center justify-between mb-4">
        <!-- Durum Rozeti -->
        <span id="status-badge" class="flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider bg-zinc-800 text-zinc-400">
          <span class="w-1.5 h-1.5 rounded-full bg-zinc-400"></span>
          Yükleniyor...
        </span>
        
        <!-- Canlı Ekolayzır -->
        <div id="equalizer" class="hidden flex items-end gap-1 h-5 w-6">
          <div class="w-1 h-full bg-m3Primary rounded-full eq-bar eq-1"></div>
          <div class="w-1 h-full bg-m3Primary rounded-full eq-bar eq-2"></div>
          <div class="w-1 h-full bg-m3Primary rounded-full eq-bar eq-3"></div>
          <div class="w-1 h-full bg-m3Primary rounded-full eq-bar eq-4"></div>
        </div>
      </div>

      <!-- Şarkı Bilgileri -->
      <div class="flex gap-4 items-center">
        <!-- Albüm Kapağı -->
        <div class="relative flex-shrink-0 w-20 h-20 bg-zinc-800 rounded-2xl overflow-hidden shadow-inner">
          <img id="now-playing-img" class="w-full h-full object-cover opacity-0 transition-opacity duration-300" src="" alt="Album Art">
          <!-- Fallback müzik ikonu -->
          <div id="now-playing-fallback" class="absolute inset-0 flex items-center justify-center bg-zinc-800 text-m3Primary">
            <span class="material-symbols-outlined text-4xl">album</span>
          </div>
        </div>
        
        <div class="min-w-0 flex-1">
          <h2 id="now-playing-title" class="font-bold text-lg text-m3OnSurface truncate">...</h2>
          <p id="now-playing-artist" class="text-sm font-medium truncate mt-0.5">...</p>
          <p id="now-playing-album" class="text-xs truncate mt-0.5">...</p>
        </div>
      </div>
    </section>

    <!-- SON DİNLEDİĞİM ŞARKILAR LİSTESİ -->
    <section class="bg-m3Surface rounded-[28px] p-6 shadow-md border border-white/5">
      <h3 class="text-xs font-bold tracking-widest text-m3Primary uppercase mb-4">Geçmiş Dinlemeler</h3>
      
      <div id="recent-list" class="space-y-4">
        <div class="text-sm text-m3OnSurfaceVariant animate-pulse">Şarkı geçmişi yükleniyor...</div>
      </div>
    </section>

    <!-- SOSYAL PROFİLLER (LİNKLER) -->
    <section class="space-y-3">
      <h3 class="text-xs font-bold tracking-widest text-m3OnSurfaceVariant text-center uppercase mb-1">Müzik Profillerim</h3>
      
      <!-- Spotify -->
      <a href="https://open.spotify.com/user/31g4uay55kjgceolr3cps3ty4n4u?si=sCQp-tIZShu5ezTRd3WS5w&utm_source=copy-link" 
         target="_blank" 
         rel="noopener noreferrer" 
         class="flex items-center justify-between p-4 bg-m3Surface hover:bg-m3SurfaceVariant rounded-2xl m3-transition border border-white/5 shadow-sm group">
        <div class="flex items-center gap-3">
          <svg class="w-6 h-6 text-[#1DB954]" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.565.387-.86.207-2.377-1.454-5.37-1.783-8.893-.982-.336.075-.668-.135-.744-.47-.076-.336.135-.668.47-.743 3.856-.88 7.15-.51 9.822 1.13.295.178.387.563.207.86zm1.224-2.72c-.226.367-.707.487-1.074.26-2.72-1.672-6.87-2.157-10.077-1.182-.413.125-.847-.107-.972-.52-.125-.413.107-.847.52-.972 3.667-1.11 8.24-.57 11.343 1.34.367.227.487.708.26 1.074zm.106-2.833C14.383 8.8 8.19 8.59 4.61 9.676c-.54.163-1.11-.147-1.273-.687-.163-.54.147-1.11.687-1.273 4.123-1.25 10.97-1.01 15.116 1.45.485.288.643.91.355 1.396-.288.485-.91.643-1.396.355z"/>
          </svg>
          <div>
            <p class="font-semibold text-sm text-m3OnSurface">Spotify</p>
            <p class="text-xs text-m3OnSurfaceVariant">Profilimi Keşfet</p>
          </div>
        </div>
        <span class="material-symbols-outlined text-m3Outline text-sm group-hover:text-m3Primary m3-transition">open_in_new</span>
      </a>

      <!-- YouTube Music -->
      <a href="https://music.youtube.com/@hasanberatkaylan" 
         target="_blank" 
         rel="noopener noreferrer" 
         class="flex items-center justify-between p-4 bg-m3Surface hover:bg-m3SurfaceVariant rounded-2xl m3-transition border border-white/5 shadow-sm group">
        <div class="flex items-center gap-3">
          <svg class="w-6 h-6 text-[#FF0000]" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm-1 4.5v-3l2.5 1.5-2.5 1.5z"/>
          </svg>
          <div>
            <p class="font-semibold text-sm text-m3OnSurface">YouTube Music</p>
            <p class="text-xs text-m3OnSurfaceVariant">Müzik Listelerim</p>
          </div>
        </div>
        <span class="material-symbols-outlined text-m3Outline text-sm group-hover:text-m3Primary m3-transition">open_in_new</span>
      </a>

      <!-- Last.fm -->
      <a href="https://www.last.fm/tr/user/hasanbkaylan" 
         target="_blank" 
         rel="noopener noreferrer" 
         class="flex items-center justify-between p-4 bg-m3Surface hover:bg-m3SurfaceVariant rounded-2xl m3-transition border border-white/5 shadow-sm group">
        <div class="flex items-center gap-3">
          <svg class="w-6 h-6 text-[#D51007]" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.4 12c-1.33 0-2.22-.64-2.76-1.48-.38-.59-.6-1.39-.73-2.07-.31-1.63-1.04-2.3-2.21-2.3-1.39 0-2.32 1.2-2.32 3.1 0 1.95.89 3.05 2.21 3.05.99 0 1.76-.58 2.08-1.57h1.56c-.4 1.77-1.93 2.92-3.64 2.92-2.45 0-3.86-1.95-3.86-4.4 0-2.5 1.48-4.45 3.96-4.45 2.06 0 3.39 1.25 3.96 3.14.07.24.16.63.26 1.01.27 1.06.66 1.7 1.46 1.7.74 0 1.22-.52 1.22-1.36V7.75h1.51v5.03c0 2.06-1.1 3.22-2.8 3.22z"/>
          </svg>
          <div>
            <p class="font-semibold text-sm text-m3OnSurface">Last.fm</p>
            <p class="text-xs text-m3OnSurfaceVariant">Dinleme İstatistiklerim</p>
          </div>
        </div>
        <span class="material-symbols-outlined text-m3Outline text-sm group-hover:text-m3Primary m3-transition">open_in_new</span>
      </a>
    </section>

  </main>

  <footer class="mt-auto pt-12 text-center">
    <p class="text-[11px] text-m3Outline">Last.fm entegrasyonu ile otomatik olarak güncellenir.</p>
  </footer>

  <script>
    // --- YAPILANDIRMA ---
    const LASTFM_API_KEY = "42256b45c944fd85183c852cf6a1bed9";
    const LASTFM_USERNAME = "hasanbkaylan"; 
    // --------------------

    // Görsel bulunamazsa veya eksik gelirse tarayıcı tarafından çizilecek şık, koyu arka planlı SVG Nota Görseli
    const FALLBACK_ART = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d0bcff' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='12' cy='12' r='10' fill='%231c1b1f'/%3E%3Cpath d='M9 18V5l12-2v13'%3E%3C/path%3E%3Ccircle cx='6' cy='18' r='3'%3E%3C/circle%3E%3Ccircle cx='18' cy='16' r='3'%3E%3C/circle%3E%3C/svg%3E";

    // Albüm kapağını her durumda güvenle çeken fonksiyon
    function getTrackImage(track, preferredSizeIndex) {
      if (!track || !track.image) return FALLBACK_ART;
      
      let imageUrl = "";
      
      // Tercih edilen boyuttaki resmi almayı dene
      if (track.image[preferredSizeIndex] && track.image[preferredSizeIndex]['#text']) {
        imageUrl = track.image[preferredSizeIndex]['#text'];
      }
      
      // Eğer o boyutta resim yoksa mevcut herhangi bir boyutu bulmaya çalış
      if (!imageUrl) {
        for (let i = track.image.length - 1; i >= 0; i--) {
          if (track.image[i] && track.image[i]['#text']) {
            imageUrl = track.image[i]['#text'];
            break;
          }
        }
      }
      
      // Eğer API boş string döndüyse ya da varsayılan boş Last.fm görseli geldiyse doğrudan FALLBACK_ART kullan
      if (!imageUrl || imageUrl.trim() === "" || imageUrl.includes("2a96cbd87f06")) {
        return FALLBACK_ART;
      }
      
      return imageUrl;
    }

    async function fetchMusic() {
      const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${LASTFM_USERNAME}&api_key=${LASTFM_API_KEY}&format=json&limit=6`;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error("API hatası");
        const data = await response.json();
        
        const trackList = data.recenttracks?.track;
        if (!trackList || trackList.length === 0) return;

        const tracks = Array.isArray(trackList) ? trackList : [trackList];

        const firstTrack = tracks[0];
        const isCurrentlyPlaying = firstTrack['@attr']?.nowplaying === "true";

        updateNowPlayingCard(firstTrack, isCurrentlyPlaying);
        
        const historyStartIndex = isCurrentlyPlaying ? 1 : 0;
        updateHistoryList(tracks.slice(historyStartIndex, historyStartIndex + 4));

      } catch (error) {
        console.error("Şarkı verileri güncellenemedi:", error);
      }
    }

    function updateNowPlayingCard(track, isLive) {
      const card = document.getElementById('now-playing-card');
      const badge = document.getElementById('status-badge');
      const eq = document.getElementById('equalizer');
      const title = document.getElementById('now-playing-title');
      const artist = document.getElementById('now-playing-artist');
      const album = document.getElementById('now-playing-album');
      const img = document.getElementById('now-playing-img');
      const fallback = document.getElementById('now-playing-fallback');

      title.innerText = track.name || "Bilinmeyen Şarkı";
      artist.innerText = track.artist?.['#text'] || "Bilinmeyen Sanatçı";
      album.innerText = track.album?.['#text'] || "";

      // Güvenli görsel çekme
      const coverUrl = getTrackImage(track, 2);
      
      if (coverUrl === FALLBACK_ART) {
        img.classList.add('opacity-0');
        fallback.classList.remove('hidden');
      } else {
        img.src = coverUrl;
        img.onload = () => {
          img.classList.remove('opacity-0');
          fallback.classList.add('hidden');
        };
        img.onerror = () => {
          img.classList.add('opacity-0');
          fallback.classList.remove('hidden');
        };
      }

      if (isLive) {
        // Canlı Dinleme Modu
        card.className = "bg-m3PrimaryContainer rounded-[28px] p-6 shadow-lg border border-m3Primary/20 m3-transition";
        
        badge.className = "flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider bg-m3Primary text-m3OnPrimary";
        badge.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-m3OnPrimary animate-pulse"></span>CANLI DİNLENİYOR`;
        eq.classList.remove('hidden');
        
        title.className = "font-bold text-lg text-white truncate";
        artist.className = "text-sm text-[#d0bcff] font-medium truncate mt-0.5";
        album.className = "text-xs text-[#eaddff]/70 truncate mt-0.5";
      } else {
        // Çevrimdışı / Son Dinlenen Modu
        card.className = "bg-m3SurfaceVariant rounded-[28px] p-6 shadow-lg border border-white/5 m3-transition";

        badge.className = "flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider bg-zinc-800 text-zinc-400";
        badge.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-zinc-500"></span>SON DİNLENEN`;
        eq.classList.add('hidden');
        
        title.className = "font-bold text-lg text-m3OnSurface truncate";
        artist.className = "text-sm text-m3Primary font-medium truncate mt-0.5";
        album.className = "text-xs text-m3OnSurfaceVariant truncate mt-0.5";
      }
    }

    function updateHistoryList(tracks) {
      const container = document.getElementById('recent-list');
      container.innerHTML = ""; 

      tracks.forEach(track => {
        const title = track.name;
        const artist = track.artist?.['#text'];
        
        // Güvenli görsel çekme (Eksikse doğrudan lokal SVG şablonu yüklenecek)
        const coverUrl = getTrackImage(track, 1);
        
        const uts = track.date?.uts;
        const timeStr = uts ? timeAgo(uts) : "Az önce";

        const item = document.createElement('div');
        item.className = "flex items-center gap-3 p-2 rounded-2xl hover:bg-white/[0.04] m3-transition";
        item.innerHTML = `
          <img class="w-11 h-11 rounded-xl object-cover bg-zinc-800 flex-shrink-0" src="${coverUrl}" alt="" onerror="this.src='${FALLBACK_ART}'">
          <div class="min-w-0 flex-1">
            <h4 class="font-semibold text-sm text-m3OnSurface truncate">${title}</h4>
            <p class="text-xs text-m3OnSurfaceVariant truncate">${artist}</p>
          </div>
          <span class="text-[11px] text-m3Outline flex-shrink-0">${timeStr}</span>
        `;
        container.appendChild(item);
      });
    }

    function timeAgo(uts) {
      const now = Math.floor(Date.now() / 1000);
      const diff = now - parseInt(uts, 10);
      if (diff < 60) return 'Az önce';
      const mins = Math.floor(diff / 60);
      if (mins < 60) return `${mins} dk`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours} sa`;
      const days = Math.floor(hours / 24);
      return `${days} gün`;
    }

    // İlk yükleme ve periyodik sorgulama (20 saniyede bir)
    fetchMusic();
    setInterval(fetchMusic, 20000);
  </script>
</body>
</html>
