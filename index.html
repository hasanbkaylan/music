<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hasan // Music</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts & Material Symbols (Material Design 3 için) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            // Material Design 3 Dark Theme Renk Paleti
            m3Bg: '#131316',
            m3Surface: '#1c1b1f',
            m3SurfaceVariant: '#2d2b30',
            m3Primary: '#d0bcff',
            m3OnPrimary: '#381e72',
            m3PrimaryContainer: '#4f378b',
            m3OnPrimaryContainer: '#eaddff',
            m3SecondaryContainer: '#4a4458',
            m3Outline: '#938f99',
            m3OnSurface: '#e6e1e5',
            m3OnSurfaceVariant: '#cac4d0',
          }
        }
      }
    }
  </script>

  <style>
    .m3-transition {
      transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
    }
    
    /* Canlı Müzik Ekolayzır Animasyonu */
    @keyframes eq-scale {
      0%, 100% { transform: scaleY(0.3); }
      50% { transform: scaleY(1); }
    }
    .eq-bar {
      transform-origin: bottom;
      animation: eq-scale 1.2s ease-in-out infinite;
    }
    .eq-1 { animation-delay: 0.1s; }
    .eq-2 { animation-delay: 0.4s; }
    .eq-3 { animation-delay: 0.2s; }
    .eq-4 { animation-delay: 0.6s; }
  </style>
</head>
<body class="bg-m3Bg text-m3OnSurface font-sans min-h-screen flex flex-col items-center py-12 px-4">

  <!-- Profil Başlığı -->
  <header class="flex flex-col items-center text-center mb-8 max-w-md w-full">
    <!-- Profil Avatar (M3 Squircle tarzı yuvarlatılmış kare) -->
    <div class="w-24 h-24 bg-m3PrimaryContainer rounded-[28px] flex items-center justify-center shadow-md mb-4 overflow-hidden select-none">
      <img src="DSC_0781~2.JPG" alt="Hasan" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');">
      <!-- Fotoğraf bulunamazsa yedek olarak görünecek harf -->
      <span class="hidden text-m3OnPrimaryContainer text-4xl font-bold">H</span>
    </div>
    <h1 class="text-3xl font-bold tracking-tight text-m3OnSurface">Hasan</h1>
  </header>

  <!-- ANA İÇERİK ALANI -->
  <main class="max-w-md w-full space-y-6">

    <!-- CANLI / SON ÇALAN KART (M3 Elevated Card) -->
    <section id="now-playing-card" class="bg-m3SurfaceVariant rounded-[28px] p-6 shadow-lg border border-white/5 m3-transition">
      <div class="flex items-center justify-between mb-4">
        <!-- Durum Rozeti -->
        <span id="status-badge" class="flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider bg-zinc-800 text-zinc-400">
          <span class="w-1.5 h-1.5 rounded-full bg-zinc-400"></span>
          Yükleniyor...
        </span>
        
        <!-- Canlı Ekolayzır -->
        <div id="equalizer" class="hidden flex items-end gap-1 h-5 w-6">
          <div class="w-1 h-full bg-m3Primary rounded-full eq-bar eq-1"></div>
          <div class="w-1 h-full bg-m3Primary rounded-full eq-bar eq-2"></div>
          <div class="w-1 h-full bg-m3Primary rounded-full eq-bar eq-3"></div>
          <div class="w-1 h-full bg-m3Primary rounded-full eq-bar eq-4"></div>
        </div>
      </div>

      <!-- Şarkı Bilgileri -->
      <div class="flex gap-4 items-center">
        <!-- Albüm Kapağı -->
        <div class="relative flex-shrink-0 w-20 h-20 bg-zinc-800 rounded-2xl overflow-hidden shadow-inner">
          <img id="now-playing-img" class="w-full h-full object-cover opacity-0 transition-opacity duration-300" src="" alt="Album Art">
          <!-- Fallback müzik ikonu -->
          <div id="now-playing-fallback" class="absolute inset-0 flex items-center justify-center bg-zinc-800 text-m3Primary">
            <span class="material-symbols-outlined text-4xl">album</span>
          </div>
        </div>
        
        <div class="min-w-0 flex-1">
          <h2 id="now-playing-title" class="font-bold text-lg text-m3OnSurface truncate">...</h2>
          <p id="now-playing-artist" class="text-sm font-medium truncate mt-0.5">...</p>
          <p id="now-playing-album" class="text-xs truncate mt-0.5">...</p>
        </div>
      </div>

      <!-- Önizleme Butonu Yuvası (Dinamik) -->
      <div id="main-preview-container" class="mt-4 border-t border-white/10 pt-3 flex justify-end hidden">
        <button id="main-preview-btn" class="flex items-center gap-2 px-4 py-2 bg-m3Primary text-m3OnPrimary rounded-full text-xs font-semibold m3-transition hover:scale-105 active:scale-95">
          <span class="material-symbols-outlined text-sm">play_arrow</span>
          <span>Önizlemeyi Çal</span>
        </button>
      </div>
    </section>

    <!-- SON DİNLEDİĞİM ŞARKILAR LİSTESİ -->
    <section class="bg-m3Surface rounded-[28px] p-6 shadow-md border border-white/5">
      <h3 class="text-xs font-bold tracking-widest text-m3Primary uppercase mb-4">Geçmiş Dinlemeler</h3>
      
      <div id="recent-list" class="space-y-4">
        <div class="text-sm text-m3OnSurfaceVariant animate-pulse">Şarkı geçmişi yükleniyor...</div>
      </div>
    </section>

    <!-- SOSYAL MEDYA LOGOLARI (M3 Tonal Circle Buttons) -->
    <section class="flex justify-center items-center gap-5 pt-4">
      <!-- Spotify -->
      <a href="https://open.spotify.com/user/31g4uay55kjgceolr3cps3ty4n4u?si=sCQp-tIZShu5ezTRd3WS5w&utm_source=copy-link" 
         target="_blank" 
         rel="noopener noreferrer" 
         class="w-12 h-12 flex items-center justify-center rounded-full bg-m3Surface hover:bg-m3SurfaceVariant border border-white/5 m3-transition shadow-sm hover:scale-105">
        <img src="spotify-white-icon.svg" alt="Spotify" class="w-5 h-5 opacity-90">
      </a>
      
      <!-- YouTube Music -->
      <a href="https://music.youtube.com/@hasanberatkaylan" 
         target="_blank" 
         rel="noopener noreferrer" 
         class="w-12 h-12 flex items-center justify-center rounded-full bg-m3Surface hover:bg-m3SurfaceVariant border border-white/5 m3-transition shadow-sm hover:scale-105">
        <img src="icons8-youtube-music.svg" alt="YouTube Music" class="w-5 h-5 opacity-90">
      </a>

      <!-- Last.fm -->
      <a href="https://www.last.fm/tr/user/hasanbkaylan" 
         target="_blank" 
         rel="noopener noreferrer" 
         class="w-12 h-12 flex items-center justify-center rounded-full bg-m3Surface hover:bg-m3SurfaceVariant border border-white/5 m3-transition shadow-sm hover:scale-105">
        <img src="last-fm-white-icon.svg" alt="Last.fm" class="w-5 h-5 opacity-90">
      </a>
    </section>

  </main>

  <footer class="mt-auto pt-10 text-center">
    <p class="text-[11px] text-m3Outline">Last.fm entegrasyonu ile otomatik olarak güncellenir.</p>
  </footer>

  <script>
    // --- YAPILANDIRMA ---
    const LASTFM_API_KEY = "42256b45c944fd85183c852cf6a1bed9";
    const LASTFM_USERNAME = "hasanbkaylan";
    // --------------------

    const FALLBACK_ART = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='4' fill='%231c1b1f'/><circle cx='12' cy='12' r='8' fill='%232d2b30'/><circle cx='12' cy='12' r='3' fill='%23d0bcff'/></svg>";

    // Global Müzik Çalar Değişkenleri
    let activeAudio = null;
    let activeTrackKey = null; // ŞarkıAdı-Sanatçı eşleşmesi
    const previewUrlCache = {}; // Çekilen url'leri önbellekte tutar

    // Güvenli görsel çekme fonksiyonu
    function getTrackImage(track, preferredSizeIndex) {
      if (!track || !track.image) return FALLBACK_ART;
      let imageUrl = "";
      if (track.image[preferredSizeIndex] && track.image[preferredSizeIndex]['#text']) {
        imageUrl = track.image[preferredSizeIndex]['#text'];
      }
      if (!imageUrl) {
        for (let i = track.image.length - 1; i >= 0; i--) {
          if (track.image[i] && track.image[i]['#text']) {
            imageUrl = track.image[i]['#text'];
            break;
          }
        }
      }
      if (!imageUrl || imageUrl.trim() === "" || imageUrl.includes("2a96cbd87f06")) {
        return FALLBACK_ART;
      }
      return imageUrl;
    }

    async function fetchMusic() {
      const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${LASTFM_USERNAME}&api_key=${LASTFM_API_KEY}&format=json&limit=6`;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error("API hatası");
        const data = await response.json();
        
        const trackList = data.recenttracks?.track;
        if (!trackList || trackList.length === 0) return;

        const tracks = Array.isArray(trackList) ? trackList : [trackList];
        const firstTrack = tracks[0];
        const isCurrentlyPlaying = firstTrack['@attr']?.nowplaying === "true";

        updateNowPlayingCard(firstTrack, isCurrentlyPlaying);
        
        const historyStartIndex = isCurrentlyPlaying ? 1 : 0;
        updateHistoryList(tracks.slice(historyStartIndex, historyStartIndex + 4));

      } catch (error) {
        console.error("Şarkı verileri güncellenemedi:", error);
      }
    }

    function updateNowPlayingCard(track, isLive) {
      const card = document.getElementById('now-playing-card');
      const badge = document.getElementById('status-badge');
      const eq = document.getElementById('equalizer');
      const title = document.getElementById('now-playing-title');
      const artist = document.getElementById('now-playing-artist');
      const album = document.getElementById('now-playing-album');
      const img = document.getElementById('now-playing-img');
      const fallback = document.getElementById('now-playing-fallback');

      const previewContainer = document.getElementById('main-preview-container');
      const previewBtn = document.getElementById('main-preview-btn');

      const tName = track.name || "Bilinmeyen Şarkı";
      const aName = track.artist?.['#text'] || "Bilinmeyen Sanatçı";

      title.innerText = tName;
      artist.innerText = aName;
      album.innerText = track.album?.['#text'] || "";

      const coverUrl = getTrackImage(track, 2);
      img.src = coverUrl;
      img.onload = () => {
        img.classList.remove('opacity-0');
        fallback.classList.add('hidden');
      };

      // Önizleme butonunu etkinleştir ve olayları bağla [1]
      previewContainer.classList.remove('hidden');
      const safeTitle = tName.replace(/'/g, "\\'");
      const safeArtist = aName.replace(/'/g, "\\'");
      previewBtn.onclick = () => togglePreview(safeTitle, safeArtist, 'main-preview-btn', true);

      // Kart stillerini uygula
      if (isLive) {
        card.className = "bg-m3PrimaryContainer rounded-[28px] p-6 shadow-lg border border-m3Primary/20 m3-transition";
        badge.className = "flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider bg-m3Primary text-m3OnPrimary";
        badge.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-m3OnPrimary animate-pulse"></span>ŞU AN DİNLİYOR`;
        eq.classList.remove('hidden');
        title.className = "font-bold text-lg text-white truncate";
        artist.className = "text-sm text-[#d0bcff] font-medium truncate mt-0.5";
        album.className = "text-xs text-[#eaddff]/70 truncate mt-0.5";
      } else {
        card.className = "bg-m3SurfaceVariant rounded-[28px] p-6 shadow-lg border border-white/5 m3-transition";
        badge.className = "flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider bg-zinc-800 text-zinc-400";
        badge.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-zinc-500"></span>SON DİNLENEN`;
        eq.classList.add('hidden');
        title.className = "font-bold text-lg text-m3OnSurface truncate";
        artist.className = "text-sm text-m3Primary font-medium truncate mt-0.5";
        album.className = "text-xs text-m3OnSurfaceVariant truncate mt-0.5";
      }

      // Sayfa yenilendiğinde aktif çalma durumu UI güncellemesi
      const trackKey = `${tName}-${aName}`;
      if (activeTrackKey === trackKey && activeAudio && !activeAudio.paused) {
        activeAudio.dataset.elementId = 'main-preview-btn';
        activeAudio.dataset.isMainCard = "true";
        updatePlayButtonUI('main-preview-btn', true, true);
      } else {
        updatePlayButtonUI('main-preview-btn', false, isLive);
      }
    }

    function updateHistoryList(tracks) {
      const container = document.getElementById('recent-list');
      container.innerHTML = ""; 

      tracks.forEach((track, index) => {
        const title = track.name;
        const artist = track.artist?.['#text'];
        const coverUrl = getTrackImage(track, 1);
        const uts = track.date?.uts;
        const timeStr = uts ? timeAgo(uts) : "Az önce";

        const safeTitle = title.replace(/'/g, "\\'");
        const safeArtist = artist.replace(/'/g, "\\'");
        const buttonId = `hist-preview-btn-${index}`;

        const item = document.createElement('div');
        item.className = "flex items-center gap-3 p-2 rounded-2xl hover:bg-white/[0.04] m3-transition";
        item.innerHTML = `
          <img class="w-11 h-11 rounded-xl object-cover bg-zinc-800 flex-shrink-0" src="${coverUrl}" alt="" onerror="this.src='${FALLBACK_ART}'">
          <div class="min-w-0 flex-1">
            <h4 class="font-semibold text-sm text-m3OnSurface truncate">${title}</h4>
            <p class="text-xs text-m3OnSurfaceVariant truncate">${artist}</p>
          </div>
          <div class="flex items-center gap-3 flex-shrink-0">
            <span class="text-[11px] text-m3Outline">${timeStr}</span>
            <button id="${buttonId}" onclick="togglePreview('${safeTitle}', '${safeArtist}', '${buttonId}', false)" class="w-8 h-8 rounded-full flex items-center justify-center bg-m3SurfaceVariant hover:bg-white/[0.08] text-m3Primary m3-transition shadow-sm">
              <span class="material-symbols-outlined text-lg">play_arrow</span>
            </button>
          </div>
        `;
        container.appendChild(item);

        // Sayfa her 20s'de bir güncellendiğinde, bu şarkı çalmaya devam ediyorsa butonun pause ikonunu koru [1]
        const trackKey = `${title}-${artist}`;
        if (activeTrackKey === trackKey && activeAudio && !activeAudio.paused) {
          activeAudio.dataset.elementId = buttonId;
          activeAudio.dataset.isMainCard = "false";
          updatePlayButtonUI(buttonId, true, false);
        }
      });
    }

    // iTunes Dinamik Müzik Önizleme Oynatıcı Motoru [1]
    async function togglePreview(title, artist, elementId, isMainCard) {
      const trackKey = `${title}-${artist}`;
      
      // 1. Aynı şarkıya tekrar tıklandıysa durum değiştir (Duraklat / Oynat)
      if (activeTrackKey === trackKey && activeAudio) {
        if (!activeAudio.paused) {
          activeAudio.pause();
          updatePlayButtonUI(elementId, false, isMainCard);
        } else {
          activeAudio.play();
          updatePlayButtonUI(elementId, true, isMainCard);
        }
        return;
      }

      // 2. Başka bir şarkı çalıyorsa onu durdur ve ikonunu sıfırla
      if (activeAudio) {
        activeAudio.pause();
        const prevElementId = activeAudio.dataset.elementId;
        const prevIsMainCard = activeAudio.dataset.isMainCard === "true";
        updatePlayButtonUI(prevElementId, false, prevIsMainCard);
      }

      // 3. iTunes API üzerinden önizleme linkini çek (Varsa cache'den al) [1]
      let previewUrl = previewUrlCache[trackKey];
      if (!previewUrl) {
        setButtonLoading(elementId, true, isMainCard);
        try {
          const query = `${title} ${artist}`;
          const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=1`);
          const data = await response.json();
          if (data.results && data.results.length > 0) {
            previewUrl = data.results[0].previewUrl;
            previewUrlCache[trackKey] = previewUrl; // Önbelleğe kaydet [1]
          }
        } catch (error) {
          console.error("iTunes API Hatası:", error);
        }
        setButtonLoading(elementId, false, isMainCard);
      }

      // 4. iTunes üzerinde şarkı bulunamadıysa uyarı ver [1]
      if (!previewUrl) {
        alert("Bu parçanın 30 saniyelik önizlemesi iTunes veritabanında bulunamadı.");
        return;
      }

      // 5. Şarkıyı oynat [1]
      activeAudio = new Audio(previewUrl);
      activeAudio.dataset.elementId = elementId;
      activeAudio.dataset.isMainCard = isMainCard;
      activeTrackKey = trackKey;

      activeAudio.play();
      updatePlayButtonUI(elementId, true, isMainCard);

      // Şarkı bittiğinde buton durumunu sıfırla [1]
      activeAudio.onended = () => {
        updatePlayButtonUI(elementId, false, isMainCard);
        activeAudio = null;
        activeTrackKey = null;
      };
    }

    // Butonların Tasarım/Durum Güncellemeleri (M3 Uyumlu)
    function updatePlayButtonUI(elementId, isPlaying, isMainCard) {
      const btn = document.getElementById(elementId);
      if (!btn) return;
      
      const icon = btn.querySelector('.material-symbols-outlined');
      
      if (isMainCard) {
        const text = btn.querySelector('span:not(.material-symbols-outlined)');
        if (isPlaying) {
          icon.innerText = "pause";
          text.innerText = "Önizlemeyi Durdur";
          btn.className = "flex items-center gap-2 px-4 py-2 bg-m3PrimaryContainer text-m3OnPrimaryContainer rounded-full text-xs font-semibold m3-transition hover:scale-105 active:scale-95";
        } else {
          icon.innerText = "play_arrow";
          text.innerText = "Önizlemeyi Çal";
          btn.className = "flex items-center gap-2 px-4 py-2 bg-m3Primary text-m3OnPrimary rounded-full text-xs font-semibold m3-transition hover:scale-105 active:scale-95";
        }
      } else {
        if (isPlaying) {
          icon.innerText = "pause";
          btn.className = "w-8 h-8 rounded-full flex items-center justify-center bg-m3PrimaryContainer text-m3OnPrimaryContainer m3-transition shadow-sm scale-105";
        } else {
          icon.innerText = "play_arrow";
          btn.className = "w-8 h-8 rounded-full flex items-center justify-center bg-m3SurfaceVariant hover:bg-white/[0.08] text-m3Primary m3-transition shadow-sm";
        }
      }
    }

    // Buton Yükleniyor Animasyonu
    function setButtonLoading(elementId, isLoading, isMainCard) {
      const btn = document.getElementById(elementId);
      if (!btn) return;
      
      const icon = btn.querySelector('.material-symbols-outlined');
      
      if (isMainCard) {
        const text = btn.querySelector('span:not(.material-symbols-outlined)');
        if (isLoading) {
          btn.disabled = true;
          icon.innerText = "sync";
          icon.classList.add("animate-spin");
          text.innerText = "Yükleniyor...";
        } else {
          btn.disabled = false;
          icon.classList.remove("animate-spin");
        }
      } else {
        if (isLoading) {
          btn.disabled = true;
          icon.innerText = "sync";
          icon.classList.add("animate-spin");
        } else {
          btn.disabled = false;
          icon.classList.remove("animate-spin");
        }
      }
    }

    function timeAgo(uts) {
      const now = Math.floor(Date.now() / 1000);
      const diff = now - parseInt(uts, 10);
      if (diff < 60) return 'Az önce';
      const mins = Math.floor(diff / 60);
      if (mins < 60) return `${mins} dk`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours} sa`;
      const days = Math.floor(hours / 24);
      return `${days} gün`;
    }

    // İlk yükleme ve periyodik sorgulama (20 saniyede bir)
    fetchMusic();
    setInterval(fetchMusic, 20000);
  </script>
</body>
</html>
